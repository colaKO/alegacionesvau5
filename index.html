<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alegaciones ciudadanas a la VAU-5 · Granada</title>
  <meta name="description" content="Ocho alegaciones ciudadanas contra la justificación de la variante de Armilla, Churriana y Las Gabias (VAU-5) en Granada.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f7f6f2;
      --surface:     #ffffff;
      --surface-alt: #f2f1ed;
      --border:      #e0ded8;
      --border-strong: #c4c2bb;

      --text:        #1a1917;
      --text-2:      #4a4844;
      --text-3:      #8a877f;

      --accent:      #1d4ed8;
      --accent-bg:   #eff6ff;
      --accent-bd:   #bfdbfe;

      --danger:      #991b1b;
      --danger-bg:   #fef2f2;
      --danger-bd:   #fecaca;

      --success:     #15803d;
      --success-bg:  #f0fdf4;
      --success-bd:  #bbf7d0;

      --r: 8px;
      --max: 760px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .site-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 1.25rem 1.5rem 0;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid var(--danger-bd);
      font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
      margin-bottom: 8px;
    }
    .site-title {
      font-size: 20px; font-weight: 700;
      color: var(--text); line-height: 1.3;
    }
    .site-sub {
      font-size: 13px; color: var(--text-2); margin-top: 3px;
    }

    /* ── TABS ── */
    .tabs {
      display: flex; overflow-x: auto; scrollbar-width: none;
      margin: 1rem -1.5rem 0; padding: 0 1.5rem;
      gap: 2px;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 9px 13px; font-size: 13px; font-family: inherit;
      color: var(--text-3); background: none; border: none;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
    }
    .tab:hover { color: var(--text); }
    .tab.on { color: var(--text); font-weight: 600; border-bottom-color: var(--text); }

    /* ── MAIN ── */
    main {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    /* ── PANELS ── */
    .panel { display: none; }
    .panel.on { display: block; }

    .p-head {
      padding: 1.75rem 0 1.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .p-label {
      font-size: 11px; font-weight: 700;
      color: var(--text-3);
      text-transform: uppercase; letter-spacing: .08em;
      margin-bottom: 6px;
    }
    .p-title {
      font-size: 19px; font-weight: 700;
      line-height: 1.35; color: var(--text);
    }
    .p-summary {
      margin-top: 12px; padding: 12px 16px;
      background: var(--accent-bg);
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--r) var(--r) 0;
      font-size: 14px; color: var(--accent);
      line-height: 1.65;
    }

    /* ── SECTIONS ── */
    .sec { margin-bottom: 1.5rem; }
    .sec-title {
      font-size: 14px; font-weight: 600; color: var(--text);
      margin-bottom: 8px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .sec-body {
      font-size: 14px; color: var(--text-2); line-height: 1.75;
    }
    .sec-body strong { color: var(--text); font-weight: 600; }
    .sec-body em { font-style: italic; }

    /* ── SUMMARY CARDS ── */
    .arg-list { display: flex; flex-direction: column; gap: 8px; }
    .arg-card {
      display: flex; gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px 14px;
    }
    .arg-card:hover { border-color: var(--border-strong); }
    .arg-num {
      font-size: 11px; font-weight: 700; color: var(--accent);
      background: var(--accent-bg); border: 1px solid var(--accent-bd);
      border-radius: 4px; padding: 2px 7px;
      flex-shrink: 0; align-self: flex-start; margin-top: 2px;
    }
    .arg-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .arg-text  { font-size: 13px; color: var(--text-2); line-height: 1.6; }

    /* ── ALT GRID ── */
    .alt-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px; margin-top: 10px;
    }
    .alt-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px 14px;
    }
    .alt-icon { font-size: 20px; margin-bottom: 6px; display: block; }
    .alt-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .alt-desc  { font-size: 12px; color: var(--text-2); line-height: 1.55; }

    /* ── PETITIONS ── */
    .pet-list { display: flex; flex-direction: column; gap: 14px; }
    .pet-item { display: flex; gap: 14px; align-items: flex-start; }
    .pet-num {
      width: 28px; height: 28px; flex-shrink: 0;
      background: var(--surface); border: 1px solid var(--border-strong);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: var(--text-2);
      margin-top: 2px;
    }
    .pet-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .pet-text  { font-size: 14px; color: var(--text-2); line-height: 1.65; }

    .p-intro {
      font-size: 14px; color: var(--text-2); line-height: 1.75;
      margin-bottom: 1.5rem; padding: 14px 16px;
      background: var(--surface-alt);
      border: 1px solid var(--border); border-radius: var(--r);
      font-style: italic;
    }

    /* ── SALVEDAD ── */
    .salvedad {
      background: var(--success-bg);
      border: 1px solid var(--success-bd);
      border-radius: var(--r);
      padding: 16px 18px; margin-top: 1.5rem;
    }
    .salvedad-title {
      font-size: 13px; font-weight: 700; color: var(--success);
      margin-bottom: 6px;
    }
    .salvedad-body { font-size: 13px; color: var(--text-2); line-height: 1.65; }

    /* ── FOOTER ── */
    .site-footer {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 1rem 1.5rem;
    }
    .footer-inner {
      max-width: var(--max); margin: 0 auto;
      display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px;
    }
    .footer-inner span { font-size: 12px; color: var(--text-3); }

    @media (max-width: 600px) {
      .site-title { font-size: 17px; }
      .p-title    { font-size: 16px; }
      .alt-grid   { grid-template-columns: 1fr; }
      .footer-inner { flex-direction: column; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner" id="header-inner"></div>
</header>

<main id="main"></main>

<footer class="site-footer">
  <div class="footer-inner">
    <span>Alegaciones ciudadanas · VAU-5 · Granada · 2024</span>
    <span>Documento presentado en el trámite de información pública de la Junta de Andalucía</span>
  </div>
</footer>

<script src="data/content.js"></script>
<script>
(function () {

  /* ── helpers ── */
  function h(tag, cls, html) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (html !== undefined) n.innerHTML = html;
    return n;
  }
  function div(cls, html) { return h('div', cls, html); }

  /* ── panel header ── */
  function pHead(label, title, summary) {
    var wrap = div('p-head');
    wrap.appendChild(h('p', 'p-label', label));
    wrap.appendChild(h('h2', 'p-title', title));
    wrap.appendChild(div('p-summary', summary));
    return wrap;
  }

  /* ── text section ── */
  function sec(titulo, texto) {
    var s = div('sec');
    s.appendChild(h('h3', 'sec-title', titulo));
    s.appendChild(h('p', 'sec-body', texto));
    return s;
  }

  /* ── panel 0: resumen ── */
  function buildResumen() {
    var panel = div('panel on');
    panel.id = 'panel-0';
    panel.appendChild(pHead('Alegaciones ciudadanas · VAU-5 · Granada', RESUMEN.titulo, RESUMEN.intro));

    var body = div('');
    var section = div('sec');
    section.appendChild(h('h3', 'sec-title', 'Los ocho argumentos en síntesis'));
    var list = div('arg-list');
    RESUMEN.argumentos.forEach(function(a) {
      var card = div('arg-card');
      card.appendChild(h('span', 'arg-num', a.num));
      var content = div('');
      content.appendChild(h('p', 'arg-label', a.label));
      content.appendChild(h('p', 'arg-text', a.texto));
      card.appendChild(content);
      list.appendChild(card);
    });
    section.appendChild(list);
    body.appendChild(section);

    var salv = div('salvedad');
    salv.appendChild(h('p', 'salvedad-title', '✓ ' + SALVEDAD.titulo));
    salv.appendChild(h('p', 'salvedad-body', SALVEDAD.texto));
    body.appendChild(salv);

    panel.appendChild(body);
    return panel;
  }

  /* ── panels 1-8: alegaciones ── */
  function buildAlegacion(data, idx) {
    var panel = div('panel');
    panel.id = 'panel-' + idx;
    panel.appendChild(pHead(data.num, data.titulo, data.resumen));

    var body = div('');
    data.secciones.forEach(function(s) {
      if (s.tipo === 'alternativas') {
        var section = div('sec');
        section.appendChild(h('h3', 'sec-title', s.titulo));
        var grid = div('alt-grid');
        s.items.forEach(function(item) {
          var card = div('alt-card');
          card.appendChild(h('span', 'alt-icon', item.icono));
          card.appendChild(h('p', 'alt-title', item.titulo));
          card.appendChild(h('p', 'alt-desc', item.desc));
          grid.appendChild(card);
        });
        section.appendChild(grid);
        body.appendChild(section);
      } else {
        body.appendChild(sec(s.titulo, s.texto));
      }
    });

    panel.appendChild(body);
    return panel;
  }

  /* ── panel 9: petición ── */
  function buildPeticion() {
    var panel = div('panel');
    panel.id = 'panel-9';
    panel.appendChild(pHead(PETICION.num, PETICION.titulo, PETICION.resumen));

    var body = div('');
    body.appendChild(h('p', 'p-intro', PETICION.intro));

    var section = div('sec');
    section.appendChild(h('h3', 'sec-title', 'Petición formal al órgano competente'));
    var list = div('pet-list');
    PETICION.peticiones.forEach(function(p) {
      var item = div('pet-item');
      item.appendChild(h('div', 'pet-num', p.num));
      var content = div('');
      content.appendChild(h('p', 'pet-title', p.titulo));
      content.appendChild(h('p', 'pet-text', p.texto));
      item.appendChild(content);
      list.appendChild(item);
    });
    section.appendChild(list);
    body.appendChild(section);

    var salv = div('salvedad');
    salv.appendChild(h('p', 'salvedad-title', '✓ Salvedad expresa: el bypass de Las Gabias'));
    salv.appendChild(h('p', 'salvedad-body', SALVEDAD.texto));
    body.appendChild(salv);

    panel.appendChild(body);
    return panel;
  }

  /* ── tab switching ── */
  function initTabs() {
    document.querySelectorAll('.tab').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var idx = btn.dataset.i;
        document.querySelectorAll('.tab').forEach(function(b) { b.classList.remove('on'); });
        document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('on'); });
        btn.classList.add('on');
        var target = document.getElementById('panel-' + idx);
        if (target) target.classList.add('on');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  /* ── boot ── */
  var tabLabels = [RESUMEN.tab].concat(ALEGACIONES.map(function(a) { return a.tab; })).concat([PETICION.tab]);

  /* header */
  var hi = document.getElementById('header-inner');
  var badge = div('badge', '⚠ ' + SITE.badge);
  hi.appendChild(badge);
  hi.appendChild(h('h1', 'site-title', SITE.title));
  hi.appendChild(h('p', 'site-sub', SITE.subtitle + ' &mdash; ' + SITE.description));

  var nav = document.createElement('nav');
  nav.className = 'tabs';
  tabLabels.forEach(function(label, i) {
    var btn = h('button', 'tab' + (i === 0 ? ' on' : ''), label);
    btn.dataset.i = i;
    nav.appendChild(btn);
  });
  hi.appendChild(nav);

  /* panels */
  var main = document.getElementById('main');
  main.appendChild(buildResumen());
  ALEGACIONES.forEach(function(a, i) { main.appendChild(buildAlegacion(a, i + 1)); });
  main.appendChild(buildPeticion());

  initTabs();

})();
</script>
</body>
</html>
